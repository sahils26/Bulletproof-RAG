[project]
name = "deeprag"
version = "0.1.0"
description = "RAG pipeline — retrieval, grading, generation, and MCP server"
requires-python = ">=3.12"
dependencies = [
    "shared",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.13.1",
    "pypdf>=6.9.2",
    "python-docx>=1.2.0",
    "sentence-transformers>=3.0.0",
    "chromadb>=1.0.0",
    "typer>=0.9.0",
    "rich>=13.0.0",
]

[project.scripts]
deeprag = "deeprag.cli:app"

[tool.uv.sources]
shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
