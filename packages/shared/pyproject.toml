[project]
name = "shared"
version = "0.1.0"
description = "Shared Pydantic models, config, and utilities for Bulletproof RAG"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.12.5",
    "pydantic-settings>=2.13.1",
    "tiktoken>=0.9.0",
    "litellm>=1.50.0",
    "tenacity>=9.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
